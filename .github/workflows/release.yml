name: Release

# Push a tag like `v0.1.0` to build the Windows installer and publish it as a
# GitHub Release (with the `latest.yml` manifest the in-app updater consumes).
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write # create / upload the release

jobs:
  release:
    # Win-only NSIS target + the prebuilt native/.node live under native/win32/x64,
    # so build on Windows.
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Stamp the version from the tag (v1.2.3 -> 1.2.3) into the package.json
      # files so electron-builder names artifacts and app.getVersion() reports it.
      - name: Sync version from tag
        run: node scripts/set-version.mjs ${{ github.ref_name }}

      # Bundle the clone-export bot engine to resources/bot-runtime/bot.mjs so
      # electron-builder ships it; the "导出好友" feature copies it into products.
      - name: Build clone-bot runtime
        run: pnpm run build:bot

      - name: Build renderer + main
        run: pnpm --filter @weq/desktop exec electron-vite build

      - name: Prepare release manifest
        run: node scripts/prepare-electron-builder-manifest.mjs

      - name: Swap in release manifest
        shell: pwsh
        run: |
          Move-Item apps/desktop/package.json apps/desktop/package.dev.json
          Move-Item apps/desktop/package.release.json apps/desktop/package.json

      # ---- Diagnostic dump (always, even on success) ---------------------
      # electron-builder runs from apps/desktop; we want to know exactly what
      # it sees: the build output, the manifest it will read, and the
      # version stamp that set-version.mjs just wrote. Cheap to log, hugely
      # useful when the next failure is "must be under <appDir>".
      - name: Dump build inputs
        if: always()
        shell: pwsh
        run: |
          Write-Host "== apps/desktop/out ==";
          Get-ChildItem -Recurse apps/desktop/out | Select-Object FullName, Length | Format-Table -AutoSize | Out-String | Write-Host
          Write-Host "== apps/desktop/package.json ==";
          Get-Content apps/desktop/package.json -Raw | Write-Host
          Write-Host "== electron-builder.yml ==";
          Get-Content apps/desktop/electron-builder.yml -Raw | Write-Host

      - name: Package + publish release
        run: pnpm --filter @weq/desktop exec electron-builder --win --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # electron-builder is chatty at DEBUG=electron-builder; leave the
          # next failure mode (asar / filter / publish) self-describing.
          DEBUG: electron-builder

      - name: Restore dev manifest
        if: always()
        shell: pwsh
        run: |
          if (Test-Path apps/desktop/package.dev.json) {
            Remove-Item apps/desktop/package.json -ErrorAction SilentlyContinue
            Move-Item apps/desktop/package.dev.json apps/desktop/package.json
          }
          Remove-Item apps/desktop/package.release.json -ErrorAction SilentlyContinue

      # If electron-builder dies, capture whatever it managed to put on
      # disk so the next iteration doesn't have to guess.
      - name: Dump release artifacts on failure
        if: failure()
        shell: pwsh
        run: |
          Write-Host "== release/ tree ==";
          if (Test-Path apps/desktop/release) {
            Get-ChildItem -Recurse apps/desktop/release | Select-Object FullName, Length | Format-Table -AutoSize | Out-String | Write-Host
          } else { Write-Host "(no release/ dir)" }
          Write-Host "== win-unpacked/peek ==";
          $p = Join-Path apps/desktop 'release'
          Get-ChildItem -Depth 3 -Path $p -ErrorAction SilentlyContinue | Select-Object FullName | Format-Table -AutoSize | Out-String | Write-Host
