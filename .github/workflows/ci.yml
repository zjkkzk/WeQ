name: CI

# Type-check gate for every push / PR onto the long-lived branches.
on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

# A newer commit on the same ref supersedes in-flight runs.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    runs-on: ubuntu-latest
    env:
      # tsc only needs the type defs, not the Electron binary — skip the ~100 MB
      # download to keep installs fast.
      ELECTRON_SKIP_BINARY_DOWNLOAD: '1'
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4 # version comes from package.json "packageManager"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type-check all packages
        run: pnpm -r typecheck
