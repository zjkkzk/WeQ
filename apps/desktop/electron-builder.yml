appId: app.weq.desktop
productName: weQ
copyright: Copyright © 2026 weQ contributors
directories:
  output: release/${version}
  buildResources: build
files:
  - "out/**/*"
  # Bare "package.json" was being resolved as a glob in this monorepo and
  # matched `../../packages/<name>/package.json` etc., which electron-builder
  # rejects ("must be under <appDir>"). Pin to the desktop app's own manifest.
  - "./package.json"
  # Keep runtime deps from this app's node_modules so bundled code can resolve
  # bare imports like `@electron-toolkit/utils` after installation.
  # Workspace packages are removed from the release manifest before packaging.
  - "node_modules/**/*"
  - "!node_modules/@weq/**/*"
extraResources:
  # native (.node) files live outside the source tree and are bundled at
  # package time. Source uses the nested layout `native/<os>/<arch>/*.node`
  # (e.g. native/win32/x64/nt_helper.node); destination keeps the same shape.
  - from: ../../native/${os}/${arch}
    to: native/${os}/${arch}
    filter:
      - '*.node'

  - from: ../../LICENSE
    to: ../LICENSE

  # Shared static assets (brand/logo, …). Copied whole so the main process can
  # read them at runtime via process.resourcesPath/resources. QQ emoji are NOT
  # bundled — they stream from the account's QQ NT dir at runtime.
  - from: ../../resources
    to: resources

  - from: ../../native
    to: ../native

  - from: node_modules/sherpa-onnx-node
    to: node_modules/sherpa-onnx-node

  - from: out/main/transcribeWorker.mjs
    to: out/main/transcribeWorker.mjs

  - from: out/main/injectWorker.mjs
    to: out/main/injectWorker.mjs

asarUnpack:
  - resources/native/**/*
  # @resvg/resvg-js loads a platform .node binding (used by the WeQ 助手 cover
  # renderer in the main process). Native addons can't be loaded from inside the
  # asar, so unpack the resvg packages (base + per-platform binding).
  - node_modules/@resvg/**/*
  # # The voice-transcription worker is forked as a child process (can't run from
  # # inside the asar) and loads the native sherpa-onnx binding from node_modules.
  # - out/main/transcribeWorker.mjs

win:
  icon: ../../resources/brand/logo.png
  target:
    - target: nsis
      arch:
        - x64
  artifactName: ${productName}-${version}-win-${arch}.${ext}
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  artifactName: ${productName}-${version}-setup.${ext}
# GitHub publish target for `electron-builder --publish always` (Release workflow).
# Generates + uploads latest.yml / *.blockmap that the in-app updater reads.
# releaseType: release => the Release is published (not a draft) and marked latest.
publish:
  provider: github
  owner: H3CoF6
  repo: WeQ
  releaseType: release
